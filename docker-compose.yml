version: "3.9"

services:
  web:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/backend/uploads
      - db:/app/backend/rzeczy.db
    env_file:
      - backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  uploads:
  db:
