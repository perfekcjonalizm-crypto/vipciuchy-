# nginx.conf — konfiguracja reverse proxy dla rzeczy.pl
# Skopiuj do: /etc/nginx/sites-available/rzeczy
# Włącz: ln -s /etc/nginx/sites-available/rzeczy /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name twojadomena.pl www.twojadomena.pl;

    # Przekieruj HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name twojadomena.pl www.twojadomena.pl;

    # SSL (Certbot uzupełni te ścieżki automatycznie)
    ssl_certificate     /etc/letsencrypt/live/twojadomena.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/twojadomena.pl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Limit rozmiaru uploadu (5 MB + margines)
    client_max_body_size 6M;

    # Logi
    access_log /var/log/nginx/rzeczy_access.log;
    error_log  /var/log/nginx/rzeczy_error.log;

    # Zdjęcia — serwuj bezpośrednio przez Nginx (szybciej)
    location /api/uploads/ {
        alias /var/www/rzeczy/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Cały ruch → Gunicorn
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}
